name: release-modules

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      nginx_version:
        description: "Override nginx version, e.g. 1.30.0"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-modules-${{ github.event.inputs.nginx_version || 'auto' }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Resolve nginx version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_NGINX_VERSION: ${{ github.event.inputs.nginx_version }}
        run: |
          set -euo pipefail
          nginx_version="${INPUT_NGINX_VERSION:-}"

          if [ -z "$nginx_version" ] || [ "$nginx_version" = "null" ]; then
            release_tag="$(./scripts/resolve-nginx-release.sh latest-docker-published)"
          else
            release_tag="$(./scripts/resolve-nginx-release.sh require-docker-tag "$nginx_version")"
          fi

          nginx_version="${release_tag#release-}"
          echo "nginx_version=$nginx_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Skip if release exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${{ steps.resolve.outputs.release_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all modules
        if: steps.exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          ./scripts/export-modules.sh "${{ steps.resolve.outputs.nginx_version }}" "${GITHUB_WORKSPACE}/dist/${{ steps.resolve.outputs.nginx_version }}"

      - name: Validate release files
        if: steps.exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/${{ steps.resolve.outputs.nginx_version }}/*/*.so)
          if [ "${#files[@]}" -ne 3 ]; then
            echo "expected 3 module files, got ${#files[@]}" >&2
            ls -R dist || true
            exit 1
          fi
          ls -lh "${files[@]}"

      - name: Create release
        if: steps.exists.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.resolve.outputs.release_tag }}
          name: ${{ steps.resolve.outputs.release_tag }}
          body: |
            Dynamic modules built for nginx ${{ steps.resolve.outputs.nginx_version }}:
            - ngx_rtmp_module.so
            - ngx_http_vhost_traffic_status_module.so
            - ngx_http_ip2region_module.so
          files: |
            dist/${{ steps.resolve.outputs.nginx_version }}/rtmp/*.so
            dist/${{ steps.resolve.outputs.nginx_version }}/vts/*.so
            dist/${{ steps.resolve.outputs.nginx_version }}/ip2region/*.so
          fail_on_unmatched_files: true
